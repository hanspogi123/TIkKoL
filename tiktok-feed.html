<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlowReel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #FF2D55;
    --accent2: #00F5D4;
    --text: #FFFFFF;
    --text-dim: rgba(255,255,255,0.6);
    --bg: #000000;
    --overlay-grad: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 40%, transparent 70%);
    --side-size: 52px;
    --font-ui: 'DM Sans', sans-serif;
    --font-display: 'Space Grotesk', sans-serif;
    --ease-snap: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --radius: 12px;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: var(--font-ui);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    touch-action: pan-y;
    user-select: none;
  }

  /* ─── Top bar ─── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    pointer-events: none;
  }
  #topbar .logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    pointer-events: all;
  }
  #topbar .logo span { color: var(--accent); }
  .tabs {
    display: flex;
    gap: 20px;
    pointer-events: all;
  }
  .tab {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.2s;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }
  .search-btn {
    pointer-events: all;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* ─── Feed container ─── */
  #feed {
    position: fixed;
    inset: 0;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  /* ─── Video slide ─── */
  .slide {
    position: relative;
    width: 100%;
    height: 100svh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    overflow: hidden;
    background: #111;
    flex-shrink: 0;
  }

  .slide video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    will-change: transform;
  }

  /* Tap-to-pause ripple */
  .tap-ripple {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .tap-ripple.show { opacity: 1; }
  .tap-ripple svg {
    width: 72px; height: 72px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    transform: scale(0.8);
    transition: transform 0.2s var(--ease-snap);
  }
  .tap-ripple.show svg { transform: scale(1); }

  /* ─── Overlay gradient ─── */
  .overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay-grad);
    pointer-events: none;
    z-index: 5;
  }
  /* Extra top gradient */
  .overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%);
  }

  /* ─── Bottom info ─── */
  .info {
    position: absolute;
    bottom: 0; left: 0;
    right: 80px;
    z-index: 20;
    padding: 20px 16px 36px;
  }
  .username {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .username .verified {
    width: 16px; height: 16px;
    background: var(--accent2);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .username .verified svg { width: 9px; height: 9px; }
  .caption {
    font-size: 14px;
    line-height: 1.5;
    color: rgba(255,255,255,0.92);
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .caption.expanded {
    -webkit-line-clamp: unset;
    overflow: visible;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
  }
  .audio-row {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .audio-disc {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin 4s linear infinite;
    animation-play-state: paused;
  }
  .slide.playing .audio-disc { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Side actions ─── */
  .actions {
    position: absolute;
    right: 10px;
    bottom: 80px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .avatar-wrap {
    position: relative;
    margin-bottom: 4px;
  }
  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid #fff;
    overflow: hidden;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
  }
  .follow-btn {
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .follow-btn:active { transform: translateX(-50%) scale(0.9); }
  .follow-btn svg { width: 10px; height: 10px; }
  .follow-btn.followed { background: #888; }

  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .action-icon {
    width: var(--side-size); height: var(--side-size);
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .action-btn:active .action-icon { transform: scale(0.9); }
  .action-btn.liked .action-icon { background: rgba(255,45,85,0.25); }
  .action-icon svg { width: 24px; height: 24px; }
  .action-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    line-height: 1;
  }

  /* Heart burst animation */
  @keyframes heartBurst {
    0% { transform: scale(1); }
    30% { transform: scale(1.4); }
    60% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  .action-btn.liked .action-icon { animation: heartBurst 0.4s var(--ease-snap); }

  /* ─── Progress bar ─── */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.2);
    z-index: 30;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ─── Scroll hint ─── */
  #scroll-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.5s;
  }
  #scroll-hint.hidden { opacity: 0; }
  #scroll-hint span {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .hint-arrow {
    animation: bounceUp 1.4s ease-in-out infinite;
  }
  @keyframes bounceUp {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  /* ─── Loading shimmer ─── */
  .shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
    background-size: 400% 400%;
    animation: shimmer 1.5s ease infinite;
    z-index: 1;
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ─── Double tap heart ─── */
  .heart-float {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    animation: floatHeart 0.8s ease-out forwards;
  }
  @keyframes floatHeart {
    0% { transform: scale(0) translateY(0); opacity: 1; }
    50% { transform: scale(1.5) translateY(-40px); opacity: 0.9; }
    100% { transform: scale(1) translateY(-80px); opacity: 0; }
  }

  /* ─── Comment sheet (bottom sheet) ─── */
  #comment-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1a1a1a;
    border-radius: 20px 20px 0 0;
    z-index: 300;
    transform: translateY(100%);
    transition: transform 0.35s var(--ease-snap);
    max-height: 65vh;
    display: flex;
    flex-direction: column;
  }
  #comment-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px;
    background: #444;
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .sheet-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    padding: 12px 20px;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }
  .comments-list {
    overflow-y: auto;
    flex: 1;
    padding: 12px 16px;
    scrollbar-width: none;
  }
  .comments-list::-webkit-scrollbar { display: none; }
  .comment-item {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .comment-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-display);
  }
  .comment-body { flex: 1; }
  .comment-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .comment-text { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.4; }
  .comment-time { font-size: 11px; color: #666; margin-top: 4px; }
  .sheet-input {
    padding: 12px 16px;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: #1a1a1a;
  }
  .sheet-input input {
    flex: 1;
    background: #2a2a2a;
    border: none;
    border-radius: 20px;
    padding: 10px 16px;
    color: #fff;
    font-family: var(--font-ui);
    font-size: 14px;
    outline: none;
  }
  .sheet-input input::placeholder { color: #666; }
  .send-btn {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .send-btn:active { transform: scale(0.9); }

  #sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 299;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }
  #sheet-backdrop.show { opacity: 1; pointer-events: all; }

  /* ─── Nav bar ─── */
  #navbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 90;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 0 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    pointer-events: none;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    pointer-events: all;
    -webkit-tap-highlight-color: transparent;
    padding: 4px 12px;
    transition: opacity 0.2s;
  }
  .nav-item:active { opacity: 0.7; }
  .nav-label { font-size: 10px; font-weight: 500; color: var(--text-dim); }
  .nav-item.active svg path, .nav-item.active svg rect, .nav-item.active svg circle { fill: #fff; }
  .nav-item.active .nav-label { color: #fff; }

  .nav-add {
    width: 46px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: all;
    transition: transform 0.15s;
    box-shadow: 0 0 0 3px rgba(255,45,85,0.2);
  }
  .nav-add:active { transform: scale(0.92); }

  /* ─── Video counter pill ─── */
  #vid-counter {
    position: fixed;
    top: 60px; right: 16px;
    z-index: 100;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-display);
    letter-spacing: 0.5px;
    transition: opacity 0.3s;
    opacity: 0;
  }
  #vid-counter.show { opacity: 1; }
</style>
</head>

// ─── State ───
let currentIdx = 0;
let likedVideos = new Set();
let followedUsers = new Set();
let scrollHintHidden = false;
let lastTapTime = 0;
const feed = document.getElementById('feed');

// ─── Build slides ───
function formatNum(n) {
  if (typeof n === 'string') return n;
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toString();
}

function createSlide(data, idx) {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.idx = idx;

  // Shimmer loader
  const shimmer = document.createElement('div');
  shimmer.className = 'shimmer';
  slide.appendChild(shimmer);

  // Video
  const video = document.createElement('video');
  video.src = data.src;
  video.poster = data.poster;
  video.loop = true;
  video.muted = false;
  video.playsInline = true;
  video.preload = idx <= 1 ? 'auto' : 'metadata';
  video.volume = 0.8;

  video.addEventListener('canplay', () => shimmer.remove());
  video.addEventListener('timeupdate', () => {
    const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
    const fill = slide.querySelector('.progress-fill');
    if (fill) fill.style.width = pct + '%';
  });

  // Tap to pause
  const tapRipple = document.createElement('div');
  tapRipple.className = 'tap-ripple';
  tapRipple.innerHTML = `<svg viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.4)"/>
    <path d="M10 8L10 16M14 8L14 16" stroke="white" stroke-width="2.5" stroke-linecap="round" id="pause-icon-${idx}"/>
  </svg>`;

  let tapTimeout;
  slide.addEventListener('click', (e) => {
    // Double tap like
    const now = Date.now();
    if (now - lastTapTime < 300) {
      triggerDoubleTapLike(e, idx, slide);
      lastTapTime = 0;
      return;
    }
    lastTapTime = now;

    setTimeout(() => {
      if (Date.now() - lastTapTime >= 250) {
        if (video.paused) {
          video.play().catch(() => {});
          slide.classList.add('playing');
          tapRipple.innerHTML = tapRipple.innerHTML.replace(/M10 8L10 16M14 8L14 16/,'M8 5L19 12L8 19');
        } else {
          video.pause();
          slide.classList.remove('playing');
          const icon = slide.querySelector(`#pause-icon-${idx}`);
          if (icon) icon.setAttribute('d', 'M10 8L10 16M14 8L14 16');
        }
        tapRipple.classList.add('show');
        clearTimeout(tapTimeout);
        tapTimeout = setTimeout(() => tapRipple.classList.remove('show'), 700);
      }
    }, 250);
  });

  // Overlay
  const overlay = document.createElement('div');
  overlay.className = 'overlay';

  // Info section
  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `
    <div class="username">
      <span>${data.user}</span>
      ${data.verified ? `<span class="verified"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L19 8" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>` : ''}
    </div>
    <div class="caption" id="caption-${idx}">${data.caption}</div>
    <div class="tags">${data.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="audio-row">
      <div class="audio-disc">
        <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="2" fill="white"/></svg>
      </div>
      <span>${data.audio}</span>
    </div>
  `;

  // Expand caption
  const caption = info.querySelector(`#caption-${idx}`);
  caption.addEventListener('click', (e) => {
    e.stopPropagation();
    caption.classList.toggle('expanded');
  });

  // Side actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  const likeCount = typeof data.likes === 'string' ? data.likes : formatNum(data.likes);

  actions.innerHTML = `
    <div class="avatar-wrap">
      <div class="avatar" style="background:${data.avatarBg}">${data.avatarText}</div>
      <div class="follow-btn" data-idx="${idx}">
        <svg viewBox="0 0 10 10" fill="none"><path d="M5 2V8M2 5H8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="action-btn like-btn" data-idx="${idx}">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" class="heart-svg">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="white" stroke-width="1.8" fill="none" class="heart-path"/>
        </svg>
      </div>
      <span class="action-label like-count">${likeCount}</span>
    </div>
    <div class="action-btn comment-btn" data-idx="${idx}">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M21 15C21 16.1 20.1 17 19 17H7L3 21V5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V15Z" stroke="white" stroke-width="1.8" fill="none"/>
        </svg>
      </div>
      <span class="action-label">${formatNum(data.comments)}</span>
    </div>
    <div class="action-btn share-btn">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="action-label">${data.shares}</span>
    </div>
    <div class="action-btn sound-btn">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" class="sound-svg">
          <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="white" stroke-width="1.8" fill="none"/>
          <path d="M15.54 8.46C16.47 9.39 17 10.66 17 12C17 13.34 16.47 14.61 15.54 15.54" stroke="white" stroke-width="1.8" stroke-linecap="round" class="sound-wave-1"/>
          <path d="M19.07 4.93C20.96 6.82 22 9.35 22 12C22 14.65 20.96 17.18 19.07 19.07" stroke="white" stroke-width="1.8" stroke-linecap="round" class="sound-wave-2"/>
        </svg>
      </div>
      <span class="action-label">Sound</span>
    </div>
  `;

  // Follow button
  actions.querySelector('.follow-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const btn = e.currentTarget;
    const followed = followedUsers.has(idx);
    if (followed) {
      followedUsers.delete(idx);
      btn.classList.remove('followed');
      btn.innerHTML = `<svg viewBox="0 0 10 10" fill="none"><path d="M5 2V8M2 5H8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    } else {
      followedUsers.add(idx);
      btn.classList.add('followed');
      btn.innerHTML = `<svg viewBox="0 0 10 10" fill="none"><path d="M2 5L4 7L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
  });

  // Like button
  actions.querySelector('.like-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleLike(idx, actions.querySelector('.like-btn'), data);
  });

  // Comment button
  actions.querySelector('.comment-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    openComments(idx, data);
  });

  // Sound toggle
  actions.querySelector('.sound-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    video.muted = !video.muted;
    const waves = actions.querySelectorAll('.sound-wave-1, .sound-wave-2');
    waves.forEach(w => {
      w.style.opacity = video.muted ? '0.2' : '1';
    });
  });

  // Progress bar
  const progressBar = document.createElement('div');
  progressBar.className = 'progress-bar';
  progressBar.innerHTML = '<div class="progress-fill"></div>';

  slide.appendChild(video);
  slide.appendChild(tapRipple);
  slide.appendChild(overlay);
  slide.appendChild(info);
  slide.appendChild(actions);
  slide.appendChild(progressBar);

  return slide;
}

function toggleLike(idx, btn, data) {
  const liked = likedVideos.has(idx);
  const heartPath = btn.querySelector('.heart-path');
  const countEl = btn.querySelector('.like-count');

  if (liked) {
    likedVideos.delete(idx);
    btn.classList.remove('liked');
    heartPath.setAttribute('fill', 'none');
    heartPath.setAttribute('stroke', 'white');
  } else {
    likedVideos.add(idx);
    btn.classList.add('liked');
    heartPath.setAttribute('fill', '#FF2D55');
    heartPath.setAttribute('stroke', '#FF2D55');
    // Reset animation
    btn.querySelector('.action-icon').style.animation = 'none';
    requestAnimationFrame(() => {
      btn.querySelector('.action-icon').style.animation = '';
    });
  }
}

function triggerDoubleTapLike(e, idx, slide) {
  const data = videos[idx];
  if (!likedVideos.has(idx)) {
    const likeBtns = slide.querySelectorAll('.like-btn');
    likeBtns.forEach(btn => toggleLike(idx, btn, data));
  }
  // Floating heart
  const heart = document.createElement('div');
  heart.className = 'heart-float';
  heart.style.left = (e.clientX - 25) + 'px';
  heart.style.top = (e.clientY - 25) + 'px';
  heart.innerHTML = `<svg width="50" height="50" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#FF2D55"/></svg>`;
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 900);
}

// ─── Comments ───
function openComments(idx, data) {
  const sheet = document.getElementById('comment-sheet');
  const backdrop = document.getElementById('sheet-backdrop');
  const list = document.getElementById('comments-list');
  const countEl = document.getElementById('comment-count');

  countEl.textContent = `(${formatNum(data.comments)})`;
  list.innerHTML = '';

  data.commentData.forEach(c => {
    const item = document.createElement('div');
    item.className = 'comment-item';
    item.innerHTML = `
      <div class="comment-avatar" style="background:${c.bg}">${c.init}</div>
      <div class="comment-body">
        <div class="comment-name">${c.name}</div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-time">${c.time} ago</div>
      </div>
    `;
    list.appendChild(item);
  });

  sheet.classList.add('open');
  backdrop.classList.add('show');
}

document.getElementById('sheet-backdrop').addEventListener('click', () => {
  document.getElementById('comment-sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('show');
});

document.getElementById('send-comment').addEventListener('click', () => {
  const input = document.getElementById('comment-input');
  const val = input.value.trim();
  if (!val) return;
  const list = document.getElementById('comments-list');
  const item = document.createElement('div');
  item.className = 'comment-item';
  item.innerHTML = `
    <div class="comment-avatar" style="background:#FF2D55">ME</div>
    <div class="comment-body">
      <div class="comment-name">@you</div>
      <div class="comment-text">${val}</div>
      <div class="comment-time">Just now</div>
    </div>
  `;
  list.insertBefore(item, list.firstChild);
  input.value = '';
  list.scrollTop = 0;
});

// ─── Video playback control ───
function playVideo(idx) {
  const slide = feed.children[idx];
  if (!slide) return;
  const video = slide.querySelector('video');
  if (!video) return;

  slide.classList.add('playing');
  const playP = video.play();
  if (playP) {
    playP.catch(() => {
      video.muted = true;
      video.play().catch(() => {});
    });
  }
}

function pauseVideo(idx) {
  const slide = feed.children[idx];
  if (!slide) return;
  const video = slide.querySelector('video');
  if (!video) return;
  slide.classList.remove('playing');
  video.pause();
}

function preloadVideo(idx) {
  const slide = feed.children[idx];
  if (!slide) return;
  const video = slide.querySelector('video');
  if (video && video.preload === 'metadata') {
    video.preload = 'auto';
    video.load();
  }
}

// ─── Intersection Observer ───
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const idx = parseInt(entry.target.dataset.idx);
    if (entry.intersectionRatio > 0.6) {
      if (idx !== currentIdx) {
        pauseVideo(currentIdx);
        currentIdx = idx;
        playVideo(currentIdx);

        // Counter
        const counter = document.getElementById('vid-counter');
        counter.textContent = `${currentIdx + 1} / ${videos.length}`;
        counter.classList.add('show');
        clearTimeout(counter._t);
        counter._t = setTimeout(() => counter.classList.remove('show'), 1800);

        // Preload next
        if (idx + 1 < videos.length) preloadVideo(idx + 1);

        // Scroll hint
        if (!scrollHintHidden) {
          scrollHintHidden = true;
          document.getElementById('scroll-hint').classList.add('hidden');
        }
      }
    }
  });
}, { threshold: [0, 0.6, 1.0] });

// ─── Build feed ───
videos.forEach((data, idx) => {
  const slide = createSlide(data, idx);
  feed.appendChild(slide);
  observer.observe(slide);
});

// ─── Auto-play first ───
setTimeout(() => playVideo(0), 300);

// ─── Keyboard nav ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'j') {
    const next = Math.min(currentIdx + 1, videos.length - 1);
    feed.children[next].scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === 'ArrowUp' || e.key === 'k') {
    const prev = Math.max(currentIdx - 1, 0);
    feed.children[prev].scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === ' ') {
    e.preventDefault();
    const slide = feed.children[currentIdx];
    const video = slide?.querySelector('video');
    if (video) {
      video.paused ? video.play() : video.pause();
    }
  }
});

// Prevent pull-to-refresh
document.addEventListener('touchmove', (e) => {
  if (feed.scrollTop <= 0 && e.touches[0].clientY > 0) return;
}, { passive: false });
</script>
